<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>통합사회 서논술형 AI 채점 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #0d0f12;
  --ink-2: #3a3d44;
  --ink-3: #7a7e89;
  --ink-4: #b4b8c4;
  --surface: #f7f6f2;
  --surface-2: #eeecea;
  --surface-3: #e4e1dd;
  --white: #ffffff;
  --accent: #c8502a;
  --accent-light: #f5ede9;
  --accent-dark: #8a3118;
  --green: #2a6e4a;
  --green-light: #e8f4ee;
  --amber: #8a6200;
  --amber-light: #fdf3d9;
  --blue: #1a4a7a;
  --blue-light: #e6eef8;
  --red: #8a1a1a;
  --red-light: #fce8e8;
  --radius: 4px;
  --radius-lg: 10px;
  --serif: 'Noto Serif KR', Georgia, serif;
  --sans: 'Noto Sans KR', sans-serif;
  --shadow: 0 2px 8px rgba(13,15,18,0.08), 0 0 0 1px rgba(13,15,18,0.04);
  --shadow-lg: 0 8px 32px rgba(13,15,18,0.12), 0 0 0 1px rgba(13,15,18,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.6;
}

/* ─── LAYOUT ─── */
.shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

/* ─── TOP BAR ─── */
.topbar {
  grid-column: 1 / -1;
  background: var(--ink);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 58px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.topbar-brand .title {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.topbar-brand .sub {
  font-size: 11px;
  color: var(--ink-4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.ai-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--ink-4);
  letter-spacing: 0.06em;
}

.ai-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
  animation: pulse-green 2s infinite;
}

@keyframes pulse-green {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--ink-4);
}

.progress-bar-outer {
  width: 100px;
  height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-inner {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ─── SIDEBAR ─── */
.sidebar {
  background: var(--ink);
  border-right: 1px solid rgba(255,255,255,0.06);
  overflow-y: auto;
  position: sticky;
  top: 58px;
  height: calc(100vh - 58px);
  padding: 20px 0;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.sidebar-section-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  padding: 14px 20px 6px;
  font-weight: 500;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 2px solid transparent;
}

.sidebar-item:hover { background: rgba(255,255,255,0.05); }
.sidebar-item.active {
  background: rgba(200, 80, 42, 0.15);
  border-left-color: var(--accent);
}

.sidebar-num {
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  width: 20px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.sidebar-text {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  line-height: 1.4;
  flex: 1;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.sidebar-item.active .sidebar-text { color: rgba(255,255,255,0.9); }

.sidebar-done {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  display: none;
  align-items: center;
  justify-content: center;
}

.sidebar-done::after {
  content: '';
  width: 6px;
  height: 4px;
  border-left: 1.5px solid white;
  border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

.sidebar-item.graded .sidebar-done { display: flex; }

/* ─── MAIN ─── */
.main {
  padding: 32px 40px;
  max-width: 800px;
  overflow-y: auto;
}

/* ─── QUESTION CARD ─── */
.question-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 20px;
}

.question-header {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--surface-2);
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.q-num-circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--white);
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.q-header-text { flex: 1; }

.q-unit-tag {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-light);
  padding: 3px 8px;
  border-radius: 2px;
  font-weight: 700;
  margin-bottom: 8px;
}

.q-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.4;
  letter-spacing: -0.02em;
}

/* ─── ANSWER AREA ─── */
.answer-section {
  padding: 22px 28px;
}

.answer-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  min-height: 160px;
  border: 1.5px solid var(--surface-3);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  font-family: var(--sans);
  font-size: 15px;
  color: var(--ink);
  background: var(--surface);
  resize: vertical;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  line-height: 1.7;
}

textarea:focus {
  border-color: var(--ink);
  background: var(--white);
}

.textarea-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  font-size: 12px;
  color: var(--ink-3);
}

.char-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.char-bar {
  width: 80px;
  height: 2px;
  background: var(--surface-3);
  border-radius: 1px;
  overflow: hidden;
}

.char-bar-fill {
  height: 100%;
  background: var(--ink-4);
  border-radius: 1px;
  transition: width 0.2s;
}

.char-bar-fill.ready { background: var(--green); }

/* ─── BUTTONS ─── */
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.btn {
  border: none;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  border-radius: var(--radius);
  padding: 10px 18px;
  transition: all 0.15s;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary {
  background: var(--ink);
  color: var(--white);
}
.btn-primary:not(:disabled):hover { background: #2a2d35; }

.btn-ai {
  background: var(--accent);
  color: var(--white);
}
.btn-ai:not(:disabled):hover { background: var(--accent-dark); }

.btn-ghost {
  background: var(--surface);
  color: var(--ink-2);
  border: 1px solid var(--surface-3);
}
.btn-ghost:not(:disabled):hover { background: var(--surface-2); }

.btn-danger {
  background: var(--red-light);
  color: var(--red);
}
.btn-danger:not(:disabled):hover { background: #f9d0d0; }

/* AI spinner */
.ai-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}

.btn-ai.loading .ai-spinner { display: block; }
.btn-ai.loading .btn-label { display: none; }

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ─── RESULT ─── */
.result-panel {
  display: none;
  padding: 0 28px 24px;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.score-hero {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  border: 1px solid var(--surface-3);
}

.score-left { display: flex; align-items: baseline; gap: 8px; }

.score-number {
  font-family: var(--serif);
  font-size: 48px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.04em;
  line-height: 1;
}

.score-denom {
  font-size: 18px;
  color: var(--ink-3);
  font-weight: 300;
}

.level-badge {
  font-size: 13px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 100px;
  letter-spacing: 0.04em;
}

.level-excellent { background: var(--green-light); color: var(--green); }
.level-good { background: var(--blue-light); color: var(--blue); }
.level-basic { background: var(--amber-light); color: var(--amber); }
.level-poor { background: var(--red-light); color: var(--red); }

/* ─── AI FEEDBACK ─── */
.ai-feedback-section {
  margin-bottom: 18px;
}

.section-heading {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.section-heading::before {
  content: '';
  display: block;
  width: 16px;
  height: 1px;
  background: var(--ink-4);
}

.ai-feedback-box {
  background: var(--ink);
  color: rgba(255,255,255,0.85);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  font-size: 14px;
  line-height: 1.75;
  white-space: pre-wrap;
}

.ai-feedback-box .streaming-cursor {
  display: inline-block;
  width: 2px;
  height: 14px;
  background: rgba(255,255,255,0.6);
  margin-left: 2px;
  animation: blink 0.8s infinite;
  vertical-align: middle;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ─── RUBRIC ─── */
.rubric-grid {
  display: grid;
  gap: 8px;
}

.rubric-row {
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  border-left: 3px solid transparent;
}

.rubric-good { background: var(--green-light); border-left-color: var(--green); }
.rubric-mid { background: var(--amber-light); border-left-color: var(--amber); }
.rubric-bad { background: var(--surface); border-left-color: var(--surface-3); }

.rubric-label {
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.5;
  flex: 1;
}

.rubric-score-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  flex-shrink: 0;
}

.rubric-status {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.rubric-good .rubric-status { color: var(--green); }
.rubric-mid .rubric-status { color: var(--amber); }
.rubric-bad .rubric-status { color: var(--ink-4); }

.rubric-pts {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 2px;
}

/* ─── MODEL ANSWER ─── */
.model-answer-wrap {
  display: none;
  margin-top: 18px;
}

.model-answer-box {
  background: #f0f4f8;
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink-2);
  border-left: 3px solid var(--blue);
  font-family: var(--serif);
}

.model-answer-label {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--blue);
  font-weight: 700;
  margin-bottom: 10px;
}

/* ─── NAV BOTTOM ─── */
.nav-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 14px 20px;
  box-shadow: var(--shadow);
}

.nav-label {
  font-size: 12px;
  color: var(--ink-3);
}

.nav-btn-group { display: flex; gap: 8px; }

/* ─── STATS PANEL ─── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  box-shadow: var(--shadow);
}

.stat-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 700;
  margin-bottom: 6px;
}

.stat-value {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}

.stat-unit {
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 400;
  font-family: var(--sans);
}

/* ─── MOBILE ─── */
@media (max-width: 800px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 20px 16px; }
  .stats-strip { grid-template-columns: repeat(2, 1fr); }
  .question-header { padding: 16px 18px 14px; }
  .answer-section { padding: 16px 18px; }
  .result-panel { padding: 0 18px 20px; }
  .score-number { font-size: 36px; }
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--ink);
  color: white;
  padding: 12px 18px;
  border-radius: var(--radius-lg);
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.25s;
  pointer-events: none;
  z-index: 999;
  max-width: 280px;
}

.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: var(--red); }
</style>
</head>
<body>

<div class="shell">

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-brand">
    <span class="title">통합사회 서논술형</span>
    <span class="sub">AI 채점 시스템</span>
  </div>
  <div class="topbar-right">
    <div class="ai-badge">
      <div class="ai-dot"></div>
      <span>Claude AI 채점</span>
    </div>
    <div class="progress-wrap">
      <span id="progressText">0 / 33</span>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
      </div>
    </div>
  </div>
</header>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar"></nav>

<!-- MAIN -->
<main class="main" id="main">

  <!-- STATS -->
  <div class="stats-strip">
    <div class="stat-card">
      <div class="stat-label">완료</div>
      <div class="stat-value" id="statDone">0<span class="stat-unit">문</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">평균 점수</div>
      <div class="stat-value" id="statAvg">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">최고 점수</div>
      <div class="stat-value" id="statBest">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">전체 문항</div>
      <div class="stat-value">33<span class="stat-unit">문</span></div>
    </div>
  </div>

  <!-- QUESTION CARD -->
  <div class="question-card" id="questionCard">
    <div class="question-header">
      <div class="q-num-circle" id="qNum">1</div>
      <div class="q-header-text">
        <div class="q-unit-tag" id="qUnit">단원 01</div>
        <div class="q-title" id="qTitle">문제 제목</div>
      </div>
    </div>

    <div class="answer-section">
      <div class="answer-label">답안 작성</div>
      <textarea id="answerInput" maxlength="1200" placeholder="핵심 개념, 이유, 예시를 포함하여 작성하면 더 좋은 점수를 받을 수 있습니다."></textarea>
      <div class="textarea-footer">
        <div class="char-bar-wrap">
          <div class="char-bar"><div class="char-bar-fill" id="charBarFill" style="width:0%"></div></div>
          <span id="charCount">0 / 1200자</span>
        </div>
        <span id="minNote" style="font-size:12px;color:var(--ink-4)">최소 30자 이상 작성 필요</span>
      </div>

      <div class="btn-row">
        <button class="btn btn-ai" id="gradeAiBtn" onclick="gradeWithAI()" disabled>
          <div class="ai-spinner" id="aiSpinner"></div>
          <span class="btn-label">✦ AI로 채점하기</span>
        </button>
        <button class="btn btn-ghost" onclick="toggleModelAnswer()" id="modelBtn" style="display:none">모범 답안</button>
        <button class="btn btn-ghost" onclick="resetAnswer()">다시 쓰기</button>
      </div>
    </div>

    <!-- RESULT -->
    <div class="result-panel" id="resultPanel">

      <div class="score-hero">
        <div class="score-left">
          <span class="score-number" id="scoreNum">0</span>
          <span class="score-denom">/ 100</span>
        </div>
        <span class="level-badge" id="levelBadge">보완 필요</span>
      </div>

      <!-- AI FEEDBACK -->
      <div class="ai-feedback-section">
        <div class="section-heading">AI 총평</div>
        <div class="ai-feedback-box" id="aiFeedback">채점 중...</div>
      </div>

      <!-- RUBRIC -->
      <div id="rubricSection">
        <div class="section-heading">항목별 평가</div>
        <div class="rubric-grid" id="rubricGrid"></div>
      </div>

      <!-- MODEL ANSWER -->
      <div class="model-answer-wrap" id="modelAnswerWrap">
        <div class="section-heading">모범 답안</div>
        <div class="model-answer-box" id="modelAnswerText"></div>
      </div>

    </div>
  </div>

  <!-- NAV BOTTOM -->
  <div class="nav-bottom">
    <span class="nav-label" id="navLabel">1 / 33번 문항</span>
    <div class="nav-btn-group">
      <button class="btn btn-ghost" id="prevBtn" onclick="navigate(-1)">← 이전</button>
      <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">다음 →</button>
    </div>
  </div>

</main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   문제 데이터 — 모범 답안은 AI 채점에만 활용되며
   직접 노출되지 않습니다 (버튼 클릭 후에만 표시).
   실제 시험용으로는 서버에서 답안을 관리하세요.
   ============================================================ */
const QUESTIONS = [

  { unit:"단원 03", title:"서술형 8", prompt:"문화권 형성에 영향을 주는 자연환경 요인과 인문환경 요인을 각각 구체적인 예시를 들어 서술하시오.", rubric:[{label:"자연환경 요인을 기후, 지형 등과 연결함",weight:25,keywords:["자연환경","기후","지형"],synonyms:["강수량","토양","산맥"]},{label:"인문환경 요인을 종교, 언어, 산업 등과 연결함",weight:25,keywords:["인문환경","종교","언어"],synonyms:["산업","역사","교통"]},{label:"구체적인 예시를 제시함",weight:30,keywords:["예","예시","예를 들어"],synonyms:["대표적으로","가령"]},{label:"문화권은 여러 요인이 복합적으로 형성함을 설명함",weight:20,keywords:["문화권","복합","형성"],synonyms:["여러 요인","함께 작용"]}], modelAnswer:"문화권은 기후, 지형 같은 자연환경과 종교, 언어, 산업, 역사 같은 인문환경이 함께 작용하여 형성된다. 예를 들어 건조 기후 지역에서는 유목 생활과 이슬람 문화가 발달한 곳이 많고, 계절풍 기후 지역에서는 벼농사를 중심으로 한 생활 문화가 나타난다. 또한 같은 자연환경이라도 종교와 역사에 따라 음식, 의복, 생활 방식이 달라질 수 있으므로 문화권은 자연환경과 인문환경이 복합적으로 작용한 결과라고 볼 수 있다."},
  { unit:"단원 03", title:"서술형 9", prompt:"문화의 5가지 속성을 각각 설명하고, 그중 하나를 선택하여 구체적인 예시를 들어 서술하시오.", rubric:[{label:"문화의 공유성, 학습성, 축적성을 설명함",weight:30,keywords:["공유성","학습성","축적성"],synonyms:["함께","배운","전승"]},{label:"문화의 변동성과 전체성을 설명함",weight:25,keywords:["변동성","전체성"],synonyms:["변화","서로 연결"]},{label:"선택한 속성의 의미를 정확히 설명함",weight:20,keywords:["의미","설명","속성"],synonyms:["뜻","특징"]},{label:"구체적인 예시를 제시함",weight:25,keywords:["예","예시","예를 들어"],synonyms:["대표적으로","가령"]}], modelAnswer:"문화의 공유성은 한 사회 구성원이 문화를 함께 가진다는 것이고, 학습성은 문화가 태어날 때부터 주어지는 것이 아니라 배워 익히는 것이라는 뜻이다. 축적성은 문화가 세대를 거치며 쌓이고 발전한다는 것이며, 변동성은 시간이 지나며 문화가 변화한다는 뜻이다. 전체성은 문화 요소들이 서로 연결되어 있다는 의미이다. 예를 들어 스마트폰 사용 문화는 사람들이 함께 사용하며 공유되고, 사용법을 배우며, 기술 발전에 따라 계속 변화하므로 학습성과 변동성을 잘 보여 준다."},
  { unit:"단원 03", title:"서술형 10", prompt:"문화 접변의 세 가지 결과를 각각 설명하고, 각각의 구체적인 예시를 들어 서술하시오.", rubric:[{label:"문화 병존을 설명함",weight:25,keywords:["문화 병존","함께 존재"],synonyms:["공존","나란히"]},{label:"문화 동화를 설명함",weight:25,keywords:["문화 동화","흡수"],synonyms:["사라지","주류 문화"]},{label:"문화 융합을 설명함",weight:25,keywords:["문화 융합","새로운 문화"],synonyms:["결합","섞여"]},{label:"각 결과에 맞는 예시를 제시함",weight:25,keywords:["예","예시","예를 들어"],synonyms:["대표적으로","가령"]}], modelAnswer:"문화 접변의 결과에는 문화 병존, 문화 동화, 문화 융합이 있다. 문화 병존은 서로 다른 문화가 각각의 특징을 유지하며 함께 존재하는 것이고, 문화 동화는 한 문화가 다른 문화에 흡수되어 고유한 특징을 잃는 것이다. 문화 융합은 서로 다른 문화 요소가 결합하여 새로운 문화가 만들어지는 것이다. 예를 들어 한 지역에서 전통 음식과 외국 음식이 함께 소비되면 문화 병존이고, 이주민이 기존 언어와 생활 방식만 사용하게 되면 문화 동화이며, 불고기 피자처럼 서로 다른 음식 문화가 결합하면 문화 융합이다."},
  { unit:"단원 04", title:"서술형 11", prompt:"문화 상대주의, 자문화 중심주의, 문화 사대주의를 비교하고, 각각의 문제점을 서술하시오.", rubric:[{label:"문화 상대주의의 의미를 설명함",weight:25,keywords:["문화 상대주의","맥락","이해"],synonyms:["그 사회의 기준","상대적으로"]},{label:"자문화 중심주의의 의미와 문제점을 설명함",weight:25,keywords:["자문화 중심주의","우월","편견"],synonyms:["자기 문화","차별"]},{label:"문화 사대주의의 의미와 문제점을 설명함",weight:25,keywords:["문화 사대주의","외래 문화","열등"],synonyms:["남의 문화","무비판적 수용"]},{label:"세 태도를 비교하여 균형 있게 서술함",weight:25,keywords:["비교","문제점","균형"],synonyms:["차이","바람직"]}], modelAnswer:"문화 상대주의는 문화를 그 사회의 역사와 환경, 가치 기준 속에서 이해하려는 태도이다. 그러나 이를 극단적으로 적용하면 인권 침해까지 문화라는 이유로 정당화할 수 있다. 자문화 중심주의는 자기 문화를 우월하다고 보고 다른 문화를 낮게 평가하는 태도로, 문화적 편견과 차별을 낳을 수 있다. 문화 사대주의는 외래 문화를 무조건 우수하게 여기고 자기 문화를 낮게 보는 태도로, 자기 문화의 가치를 잃게 만들 수 있다. 따라서 다른 문화를 존중하되 보편적 인권과 윤리도 함께 고려해야 한다."},
  { unit:"단원 04", title:"서술형 12", prompt:"보편 윤리의 의미와 필요성을 극단적 문화 상대주의와 연관지어 서술하시오.", rubric:[{label:"보편 윤리의 의미를 설명함",weight:25,keywords:["보편 윤리","인간","존엄"],synonyms:["인권","공통 가치"]},{label:"극단적 문화 상대주의의 한계를 설명함",weight:30,keywords:["극단적 문화 상대주의","한계","정당화"],synonyms:["인권 침해","무조건 인정"]},{label:"문화 존중과 인권 보호의 균형을 설명함",weight:25,keywords:["문화 존중","인권","균형"],synonyms:["존중","보호","조화"]},{label:"구체적인 사례나 적용 방향을 제시함",weight:20,keywords:["사례","예","적용"],synonyms:["예를 들어","해결"]}], modelAnswer:"보편 윤리는 문화와 시대가 달라도 인간이라면 존중받아야 할 기본 가치와 도덕 원칙을 말한다. 문화 상대주의는 다른 문화를 그 사회의 맥락에서 이해하게 해 주지만, 극단적으로 적용하면 명예살인이나 여성 차별처럼 인간의 존엄성을 침해하는 행위도 전통이라는 이유로 정당화될 수 있다. 따라서 문화를 존중하되 생명, 자유, 평등, 인권 같은 보편 윤리를 기준으로 문제를 판단해야 한다."},
  { unit:"단원 05", title:"서술형 13", prompt:"다문화 사회로의 진입이 가져오는 변화를 긍정적 측면과 부정적 측면으로 나누어 서술하시오.", rubric:[{label:"다문화 사회의 의미를 설명함",weight:20,keywords:["다문화 사회","다양한 문화","공존"],synonyms:["이주민","외국인","문화 다양성"]},{label:"긍정적 측면을 설명함",weight:30,keywords:["긍정","문화 다양성","교류"],synonyms:["창의성","경제 활성화","새로운 문화"]},{label:"부정적 측면을 설명함",weight:30,keywords:["부정","갈등","차별"],synonyms:["편견","소통 문제","배제"]},{label:"갈등 해결의 필요성을 제시함",weight:20,keywords:["해결","존중","소통"],synonyms:["이해","정책","교육"]}], modelAnswer:"다문화 사회는 서로 다른 문화적 배경을 가진 사람들이 함께 살아가는 사회이다. 긍정적으로는 다양한 문화가 공존하면서 문화 교류가 활발해지고, 새로운 아이디어와 창의성이 생기며 노동력과 경제 활동에도 도움이 될 수 있다. 그러나 언어와 생활 방식의 차이로 갈등이 생기거나, 이주민과 소수 문화에 대한 편견과 차별이 나타날 수 있다. 따라서 다문화 사회에서는 문화 다양성을 존중하고 차별을 줄이기 위한 교육과 제도적 노력이 필요하다."},
  { unit:"단원 05", title:"서술형 14", prompt:"다문화 사회의 갈등 해결을 위한 개인적 차원과 사회적 차원의 노력을 각각 서술하시오.", rubric:[{label:"개인적 차원의 노력을 제시함",weight:30,keywords:["개인적 차원","존중","편견"],synonyms:["이해","소통","차별하지"]},{label:"사회적 차원의 노력을 제시함",weight:30,keywords:["사회적 차원","제도","정책"],synonyms:["교육","지원","법"]},{label:"갈등 원인을 문화 차이와 차별로 설명함",weight:20,keywords:["갈등","문화 차이","차별"],synonyms:["언어","편견","배제"]},{label:"상호 존중과 사회 통합을 연결함",weight:20,keywords:["상호 존중","사회 통합","공존"],synonyms:["함께 살아","통합"]}], modelAnswer:"다문화 사회의 갈등은 문화 차이, 언어 문제, 편견과 차별에서 생길 수 있다. 개인적 차원에서는 다른 문화를 무시하지 않고 이해하려는 태도를 가지며, 일상에서 차별적 표현을 사용하지 않고 소통하려는 노력이 필요하다. 사회적 차원에서는 다문화 교육, 언어 지원, 차별 금지 제도, 이주민의 사회 참여 보장 같은 정책이 필요하다. 이러한 노력이 함께 이루어질 때 서로 다른 문화가 공존하고 사회 통합도 가능해진다."},
  { unit:"단원 02", title:"서술형 15", prompt:"플라톤과 아리스토텔레스의 행복론을 비교하여 공통점과 차이점을 서술하시오.", rubric:[{label:"플라톤의 행복론을 이데아와 영혼의 조화로 설명함",weight:30,keywords:["플라톤","이데아","영혼"],synonyms:["선의 이데아","조화","철학"]},{label:"아리스토텔레스의 행복론을 덕과 중용으로 설명함",weight:30,keywords:["아리스토텔레스","덕","중용"],synonyms:["이성","실천","습관"]},{label:"공통점을 설명함",weight:20,keywords:["공통점","이성","덕"],synonyms:["둘 다","도덕적 삶"]},{label:"차이점을 설명함",weight:20,keywords:["차이점","현실","이데아"],synonyms:["다르게","실천"]}], modelAnswer:"플라톤은 참된 행복을 선의 이데아를 인식하고 영혼이 조화를 이루는 삶으로 보았다. 아리스토텔레스는 인간의 고유한 기능인 이성을 잘 발휘하고, 중용의 덕을 실천하는 삶을 행복으로 보았다. 두 사상가는 모두 이성과 덕을 중시했다는 공통점이 있지만, 플라톤은 초월적 진리인 이데아의 인식을 강조했고 아리스토텔레스는 현실 속에서 덕을 습관적으로 실천하는 삶을 강조했다는 차이가 있다."},
  { unit:"단원 01 심화", title:"서술형 16", prompt:"청소년 스마트폰 과의존 문제를 시간적, 공간적, 사회적, 윤리적 관점에서 통합적으로 분석하시오.", rubric:[{label:"시간적 관점에서 원인이나 변화 과정을 설명함",weight:25,keywords:["시간적 관점","변화","과거","현재"],synonyms:["발달","흐름","증가"]},{label:"공간적 관점에서 장소와 환경 차이를 설명함",weight:20,keywords:["공간적 관점","장소","환경"],synonyms:["지역","가정","학교"]},{label:"사회적 관점에서 제도와 관계를 분석함",weight:25,keywords:["사회적 관점","제도","관계"],synonyms:["친구","가족","미디어","플랫폼"]},{label:"윤리적 관점에서 책임과 바람직한 태도를 제시함",weight:30,keywords:["윤리적 관점","책임","바람직"],synonyms:["절제","권리","의무"]}], modelAnswer:"청소년 스마트폰 과의존은 스마트폰 보급과 온라인 콘텐츠 발달이라는 시간적 변화 속에서 심화되었다. 공간적으로는 가정, 학교, 지역의 여가 환경과 학습 환경에 따라 사용 양상이 달라진다. 사회적으로는 또래 관계, 가족 소통, 플랫폼의 추천 알고리즘, 학교 규칙 등이 영향을 미친다. 윤리적으로는 개인의 자기 절제와 함께 기업의 책임 있는 서비스 설계, 가정과 학교의 지도도 필요하다. 따라서 이 문제는 한 가지 원인으로만 볼 것이 아니라 여러 관점을 함께 고려해야 한다."},
  { unit:"단원 01 심화", title:"서술형 17", prompt:"기후 변화 문제를 사실 문제와 가치 문제로 구분하고, 두 측면을 함께 고려해야 하는 이유를 서술하시오.", rubric:[{label:"사실 문제를 과학적 자료와 원인 분석으로 설명함",weight:25,keywords:["사실 문제","자료","원인"],synonyms:["과학","온실가스","기온"]},{label:"가치 문제를 책임과 정의의 문제로 설명함",weight:30,keywords:["가치 문제","책임","정의"],synonyms:["공정","윤리","세대"]},{label:"두 측면을 구분하여 서술함",weight:20,keywords:["구분","사실","가치"],synonyms:["다르","측면"]},{label:"정책 결정에서 둘 다 필요함을 설명함",weight:25,keywords:["정책","해결","함께 고려"],synonyms:["대책","종합","결정"]}], modelAnswer:"기후 변화에서 사실 문제는 지구 평균 기온 상승, 온실가스 배출량, 이상 기후 증가처럼 과학적 자료를 통해 확인할 수 있는 부분이다. 가치 문제는 누가 더 책임을 져야 하는지, 현재 세대와 미래 세대 사이의 부담을 어떻게 나눌지, 경제 발전과 환경 보호 중 무엇을 우선할지와 관련된다. 기후 변화 대책은 정확한 자료 분석만으로 충분하지 않고 공정성과 책임에 대한 판단도 필요하므로 사실 문제와 가치 문제를 함께 고려해야 한다."},
  { unit:"단원 02 심화", title:"서술형 18", prompt:"행복한 삶을 위해 경제적 조건이 필요한 이유와, 경제적 조건만으로 행복이 완성될 수 없는 이유를 함께 서술하시오.", rubric:[{label:"경제적 조건의 필요성을 기본 생활 보장과 연결함",weight:30,keywords:["경제적 조건","기본 생활","필요"],synonyms:["소득","주거","의식주"]},{label:"경제적 조건만으로 행복이 완성되지 않음을 설명함",weight:30,keywords:["만으로","행복","완성"],synonyms:["충분하지","한계"]},{label:"관계, 자아실현, 건강 등 비경제적 조건을 제시함",weight:25,keywords:["관계","자아실현","건강"],synonyms:["여가","공동체","정신적"]},{label:"균형 잡힌 결론을 제시함",weight:15,keywords:["균형","함께","조화"],synonyms:["동시에","종합"]}], modelAnswer:"경제적 조건은 의식주, 의료, 교육 등 기본 생활을 보장하기 때문에 행복한 삶의 중요한 기반이 된다. 그러나 돈이나 소득만으로 행복이 완성되는 것은 아니다. 인간은 타인과의 관계, 건강, 여가, 자아실현, 공동체 속에서의 인정도 필요로 하기 때문이다. 따라서 경제적 안정은 행복의 필요 조건이 될 수 있지만, 충분 조건은 아니며 물질적 조건과 정신적·사회적 조건이 균형을 이루어야 한다."},
  { unit:"단원 02 심화", title:"서술형 19", prompt:"아리스토텔레스의 중용 개념을 활용하여 학교생활에서 발생할 수 있는 갈등 상황의 해결 방안을 서술하시오.", rubric:[{label:"중용의 의미를 지나침과 모자람 사이의 적절함으로 설명함",weight:30,keywords:["중용","지나침","모자람"],synonyms:["적절","균형"]},{label:"학교생활 갈등 상황을 구체적으로 제시함",weight:20,keywords:["학교","갈등","상황"],synonyms:["친구","수업","생활"]},{label:"중용을 적용한 해결 방안을 제시함",weight:30,keywords:["해결 방안","적용","중용"],synonyms:["실천","조절","대화"]},{label:"덕과 습관의 중요성을 설명함",weight:20,keywords:["덕","습관","실천"],synonyms:["반복","태도","인격"]}], modelAnswer:"아리스토텔레스의 중용은 지나침과 모자람 사이에서 이성에 따라 적절한 태도를 선택하는 것이다. 예를 들어 친구와 의견 충돌이 있을 때 무조건 참는 것은 소극적이고, 감정적으로 화를 내는 것은 지나친 태도이다. 이때 상대의 의견을 듣고 자신의 생각을 차분히 말하는 것이 중용에 가까운 해결 방식이다. 이러한 태도는 한 번의 행동으로 끝나는 것이 아니라 반복적인 실천과 습관을 통해 덕으로 자리 잡을 수 있다."},
  { unit:"단원 03 심화", title:"서술형 20", prompt:"세계화가 지역 문화에 미치는 영향을 문화 다양성의 확대와 문화 획일화의 위험이라는 두 측면에서 서술하시오.", rubric:[{label:"세계화의 의미를 설명함",weight:20,keywords:["세계화","교류","확대"],synonyms:["국경","연결","이동"]},{label:"문화 다양성 확대의 긍정적 측면을 설명함",weight:30,keywords:["문화 다양성","확대","긍정"],synonyms:["교류","선택","새로운 문화"]},{label:"문화 획일화의 위험을 설명함",weight:30,keywords:["문화 획일화","위험","지역 문화"],synonyms:["사라지","동질화","상업화"]},{label:"지역 문화 보존과 개방의 균형을 제시함",weight:20,keywords:["보존","개방","균형"],synonyms:["전통","창조적 계승"]}], modelAnswer:"세계화는 국가와 지역 사이의 교류를 확대하여 다양한 문화를 접할 기회를 늘린다. 이로 인해 사람들은 음식, 음악, 의복 등에서 더 많은 선택지를 갖게 되고 새로운 문화가 만들어질 수 있다. 그러나 세계적으로 영향력이 큰 문화가 빠르게 확산되면 지역 고유의 문화가 약화되고 생활 양식이 비슷해지는 문화 획일화가 나타날 수 있다. 따라서 세계 문화를 개방적으로 받아들이되 지역 문화의 가치를 보존하고 창조적으로 계승하려는 노력이 필요하다."},
  { unit:"단원 03 심화", title:"서술형 21", prompt:"문화의 전체성을 고려할 때, 한 사회의 결혼 문화 변화가 가족, 경제, 가치관에 미칠 수 있는 영향을 서술하시오.", rubric:[{label:"문화의 전체성 의미를 설명함",weight:25,keywords:["전체성","문화 요소","연결"],synonyms:["상호 관련","서로 영향"]},{label:"결혼 문화 변화와 가족 구조 변화를 연결함",weight:25,keywords:["결혼 문화","가족","변화"],synonyms:["가족 형태","1인 가구","출산"]},{label:"경제와 사회 제도에 미치는 영향을 설명함",weight:25,keywords:["경제","제도","영향"],synonyms:["주거","육아","복지"]},{label:"가치관 변화까지 종합적으로 서술함",weight:25,keywords:["가치관","종합","삶"],synonyms:["개인주의","평등","인식"]}], modelAnswer:"문화의 전체성은 한 사회의 문화 요소들이 따로 떨어져 있지 않고 서로 연결되어 있다는 뜻이다. 결혼 문화가 변화하면 가족 형태와 출산, 자녀 양육 방식이 달라질 수 있다. 또한 주거 수요, 육아 제도, 복지 정책, 소비 방식 같은 경제와 사회 제도에도 영향을 준다. 더 나아가 개인의 자유, 성평등, 가족의 의미에 대한 가치관도 변화한다. 따라서 결혼 문화 변화는 하나의 문화 요소 변화에 그치지 않고 사회 전체의 여러 영역과 연결된다."},
  { unit:"단원 04 심화", title:"서술형 22", prompt:"극단적 문화 상대주의가 인권 침해를 정당화할 수 있는 이유를 사례와 함께 비판적으로 서술하시오.", rubric:[{label:"문화 상대주의와 극단적 문화 상대주의를 구분함",weight:25,keywords:["문화 상대주의","극단적","구분"],synonyms:["차이","맥락"]},{label:"인권 침해 정당화의 위험을 설명함",weight:30,keywords:["인권 침해","정당화","위험"],synonyms:["차별","폭력","억압"]},{label:"구체적인 사례를 제시함",weight:20,keywords:["사례","예","예를 들어"],synonyms:["가령","대표적으로"]},{label:"보편 윤리와 문화 존중의 균형을 제시함",weight:25,keywords:["보편 윤리","문화 존중","균형"],synonyms:["인간 존엄","비판적 수용"]}], modelAnswer:"문화 상대주의는 다른 문화를 그 사회의 맥락에서 이해하려는 태도이지만, 극단적 문화 상대주의는 모든 문화를 무조건 인정해야 한다고 본다는 점에서 문제가 있다. 이 경우 여성 차별, 아동 학대, 명예살인처럼 인간의 기본권을 침해하는 행위도 전통이라는 이유로 정당화될 수 있다. 문화는 존중되어야 하지만 인간의 생명과 존엄, 자유와 평등을 침해하는 행위까지 허용할 수는 없다. 따라서 문화 이해와 보편 윤리 사이의 균형이 필요하다."},
  { unit:"단원 04 심화", title:"서술형 23", prompt:"자문화 중심주의가 국가 간 갈등이나 사회 내부 차별로 이어질 수 있는 과정을 설명하고, 이를 극복하기 위한 태도를 서술하시오.", rubric:[{label:"자문화 중심주의의 의미를 설명함",weight:25,keywords:["자문화 중심주의","자기 문화","우월"],synonyms:["자국 문화","중심"]},{label:"국가 간 갈등 또는 차별로 이어지는 과정을 설명함",weight:30,keywords:["갈등","차별","과정"],synonyms:["편견","배척","충돌"]},{label:"구체적인 예시나 상황을 제시함",weight:20,keywords:["예","상황","사례"],synonyms:["예를 들어","가령"]},{label:"문화 상대주의와 상호 존중의 태도를 제시함",weight:25,keywords:["문화 상대주의","상호 존중","극복"],synonyms:["이해","소통","평등"]}], modelAnswer:"자문화 중심주의는 자신의 문화를 우월하게 여기고 다른 문화를 낮게 평가하는 태도이다. 이러한 태도는 다른 나라의 생활 방식이나 종교, 언어를 열등하게 보게 만들어 국가 간 갈등을 일으킬 수 있고, 사회 내부에서는 이주민이나 소수 문화 집단에 대한 차별로 이어질 수 있다. 예를 들어 특정 언어와 음식 문화만 정상이라고 생각하면 다른 문화를 가진 사람을 배척하게 된다. 이를 극복하려면 다른 문화를 그 사회의 맥락에서 이해하고, 모든 문화 구성원을 동등하게 존중하는 태도가 필요하다."},
  { unit:"단원 05 심화", title:"서술형 24", prompt:"다문화 사회에서 동화주의와 다문화주의 정책의 차이를 비교하고, 바람직한 사회 통합 방향을 서술하시오.", rubric:[{label:"동화주의의 의미와 한계를 설명함",weight:30,keywords:["동화주의","주류 문화","한계"],synonyms:["적응","흡수","소수 문화"]},{label:"다문화주의의 의미와 장점을 설명함",weight:30,keywords:["다문화주의","문화 다양성","존중"],synonyms:["공존","인정","다양"]},{label:"두 정책의 차이를 비교함",weight:20,keywords:["비교","차이","정책"],synonyms:["반면","다르게"]},{label:"바람직한 사회 통합 방향을 제시함",weight:20,keywords:["사회 통합","방향","평등"],synonyms:["참여","권리","소통"]}], modelAnswer:"동화주의는 이주민이나 소수 집단이 주류 문화에 적응하도록 요구하는 정책 방향이다. 사회 질서를 빠르게 통합할 수 있다는 장점이 있지만, 소수 문화의 정체성과 권리를 약화시킬 수 있다. 다문화주의는 다양한 문화가 공존하고 존중받아야 한다고 보는 입장으로, 문화 다양성을 보장하지만 집단 간 분리나 갈등이 생기지 않도록 소통이 필요하다. 바람직한 사회 통합은 소수 문화를 무시하지 않으면서도 모든 구성원이 공통의 시민적 가치와 권리를 공유하도록 하는 방향이어야 한다."},
  { unit:"단원 05 심화", title:"서술형 25", prompt:"이주민에 대한 편견이 형성되는 원인을 사회적 관점에서 분석하고, 이를 줄이기 위한 교육적·제도적 방안을 서술하시오.", rubric:[{label:"편견 형성 원인을 사회 구조와 인식으로 분석함",weight:30,keywords:["편견","사회 구조","인식"],synonyms:["고정관념","차별","미디어"]},{label:"교육적 방안을 제시함",weight:25,keywords:["교육","다문화 교육","이해"],synonyms:["학교","수업","체험"]},{label:"제도적 방안을 제시함",weight:25,keywords:["제도","법","정책"],synonyms:["차별 금지","지원","권리"]},{label:"사회 통합과 연결함",weight:20,keywords:["사회 통합","공존","존중"],synonyms:["평등","참여","소통"]}], modelAnswer:"이주민에 대한 편견은 낯선 문화에 대한 무지, 미디어의 부정적 이미지, 경제적 경쟁에 대한 불안, 사회적 고정관념 등에서 형성될 수 있다. 이를 줄이기 위해 학교에서는 다문화 교육과 문화 교류 활동을 통해 서로 다른 문화를 이해하도록 해야 한다. 제도적으로는 차별 금지 규정, 언어 지원, 노동권 보호, 지역사회 참여 기회 확대가 필요하다. 이러한 교육적·제도적 노력이 함께 이루어질 때 이주민도 사회 구성원으로 존중받고 사회 통합이 가능해진다."},
  { unit:"단원 06 심화", title:"서술형 26", prompt:"지역 축제가 지역 정체성 형성과 지역 경제에 미치는 영향을 긍정적 측면과 한계로 나누어 서술하시오.", rubric:[{label:"지역 정체성 형성 효과를 설명함",weight:25,keywords:["지역 정체성","축제","공동체"],synonyms:["소속감","전통","자부심"]},{label:"지역 경제 활성화 효과를 설명함",weight:25,keywords:["지역 경제","관광","활성화"],synonyms:["상권","일자리","소득"]},{label:"상업화나 획일화 같은 한계를 설명함",weight:25,keywords:["한계","상업화","획일화"],synonyms:["환경 문제","일회성","예산 낭비"]},{label:"지속 가능한 운영 방안을 제시함",weight:25,keywords:["지속 가능","주민 참여","보존"],synonyms:["균형","개선","지역 문화"]}], modelAnswer:"지역 축제는 지역의 역사와 문화를 드러내어 주민들의 소속감과 자부심을 높이고 지역 정체성을 형성하는 데 도움이 된다. 또한 관광객을 유치하여 상권을 활성화하고 일자리와 소득을 늘리는 효과도 있다. 그러나 축제가 지나치게 상업화되면 지역 고유성이 약해지고, 비슷한 축제가 반복되어 획일화될 수 있으며 예산 낭비나 환경 문제도 생길 수 있다. 따라서 지역 축제는 주민 참여를 바탕으로 지역 문화를 보존하면서 지속 가능하게 운영되어야 한다."},
  { unit:"단원 06 심화", title:"서술형 27", prompt:"도시 재개발이 주민의 삶에 미치는 영향을 공간적 관점과 윤리적 관점에서 분석하시오.", rubric:[{label:"공간적 관점에서 토지 이용과 생활 공간 변화를 설명함",weight:30,keywords:["공간적 관점","토지 이용","생활 공간"],synonyms:["주거","교통","지역"]},{label:"윤리적 관점에서 권리와 공정성을 설명함",weight:30,keywords:["윤리적 관점","권리","공정"],synonyms:["정의","주거권","약자"]},{label:"긍정적 효과와 부정적 영향을 함께 제시함",weight:25,keywords:["긍정","부정","영향"],synonyms:["개선","갈등","쫓겨남"]},{label:"주민 참여와 보상 등 해결 방향을 제시함",weight:15,keywords:["주민 참여","보상","해결"],synonyms:["의견","대책","보호"]}], modelAnswer:"도시 재개발은 공간적 관점에서 낡은 주거지와 기반 시설을 개선하고 토지 이용을 효율적으로 바꾸는 과정이다. 하지만 재개발로 집값과 임대료가 상승하면 기존 주민이 살던 지역에서 밀려날 수 있다. 윤리적 관점에서는 개발 이익뿐만 아니라 주민의 주거권, 공정한 보상, 사회적 약자의 보호가 중요하다. 따라서 재개발은 생활 환경 개선이라는 긍정적 효과를 살리면서도 주민 참여를 보장하고 충분한 보상과 이주 대책을 마련하는 방식으로 이루어져야 한다."},
  { unit:"단원 06 심화", title:"서술형 28", prompt:"지역 격차가 개인의 행복에 미치는 영향을 교육, 의료, 교통 조건과 연결하여 서술하시오.", rubric:[{label:"지역 격차의 의미를 설명함",weight:20,keywords:["지역 격차","차이","불균형"],synonyms:["불평등","수도권","지방"]},{label:"교육 조건과 행복을 연결함",weight:25,keywords:["교육","기회","행복"],synonyms:["학교","학습","진로"]},{label:"의료와 교통 조건을 설명함",weight:30,keywords:["의료","교통","접근성"],synonyms:["병원","대중교통","이동"]},{label:"해결 방향을 제시함",weight:25,keywords:["해결","균형 발전","정책"],synonyms:["지원","확충","개선"]}], modelAnswer:"지역 격차는 지역에 따라 생활 기회와 시설 수준이 다르게 나타나는 현상이다. 교육 시설과 학습 기회가 부족한 지역에서는 학생의 진로 선택과 성장 가능성이 제한될 수 있다. 의료 시설이 부족하면 건강을 지키기 어렵고, 교통이 불편하면 학교, 직장, 문화 시설에 접근하기 힘들어진다. 이러한 조건은 개인의 삶의 질과 행복에 직접적인 영향을 준다. 따라서 교육, 의료, 교통 인프라를 고르게 확충하고 지역 균형 발전 정책을 추진해야 한다."},
  { unit:"단원 07 심화", title:"서술형 29", prompt:"사회적 약자의 행복을 보장하기 위해 국가와 시민이 해야 할 역할을 각각 서술하시오.", rubric:[{label:"사회적 약자의 의미를 설명함",weight:20,keywords:["사회적 약자","불리","취약"],synonyms:["노인","장애인","아동","저소득층"]},{label:"국가의 역할을 복지와 제도 보장으로 설명함",weight:30,keywords:["국가","복지","제도"],synonyms:["지원","법","정책"]},{label:"시민의 역할을 존중과 참여로 설명함",weight:25,keywords:["시민","존중","참여"],synonyms:["배려","봉사","연대"]},{label:"인간 존엄과 행복을 연결함",weight:25,keywords:["인간 존엄","행복","권리"],synonyms:["기본권","평등","삶의 질"]}], modelAnswer:"사회적 약자는 경제적, 신체적, 사회적 조건 때문에 생활에서 불리한 위치에 놓인 사람들을 말한다. 국가는 이들의 행복을 보장하기 위해 복지 제도, 교육과 의료 지원, 차별 금지 법과 같은 제도를 마련해야 한다. 시민은 사회적 약자를 시혜의 대상으로만 보지 않고 동등한 권리를 가진 구성원으로 존중해야 하며, 배려와 참여, 연대를 실천해야 한다. 사회적 약자의 행복 보장은 인간 존엄과 평등을 실현하는 중요한 조건이다."},

  { unit:"단원 07 심화", title:"서술형 32", prompt:"인공지능 기술의 확산이 인간의 행복에 미칠 수 있는 영향을 긍정적 측면과 윤리적 쟁점으로 나누어 서술하시오.", rubric:[{label:"인공지능의 긍정적 영향을 설명함",weight:30,keywords:["인공지능","긍정","편리"],synonyms:["효율","의료","교육","생활"]},{label:"윤리적 쟁점을 설명함",weight:30,keywords:["윤리","쟁점","문제"],synonyms:["개인정보","차별","책임","일자리"]},{label:"행복과 삶의 질에 연결함",weight:20,keywords:["행복","삶의 질","영향"],synonyms:["만족","안전","불안"]},{label:"바람직한 활용 방향을 제시함",weight:20,keywords:["활용","방향","규제"],synonyms:["책임","제도","공정"]}], modelAnswer:"인공지능 기술은 의료 진단, 맞춤형 교육, 교통, 생활 서비스의 효율을 높여 인간의 삶을 더 편리하고 안전하게 만들 수 있다. 그러나 개인정보 침해, 알고리즘 차별, 일자리 감소, 사고 발생 시 책임 소재 같은 윤리적 쟁점도 함께 나타난다. 인공지능이 인간의 행복에 기여하려면 기술 발전 자체만을 중시할 것이 아니라 인간의 존엄, 공정성, 안전을 보장하는 제도와 책임 있는 활용 기준이 마련되어야 한다."},
  { unit:"단원 종합 심화", title:"서술형 33", prompt:"관광 개발과 전통문화 보존이 충돌하는 상황에서 통합적 관점을 활용하여 해결 방안을 서술하시오.", rubric:[{label:"관광 개발의 긍정적 효과를 설명함",weight:20,keywords:["관광 개발","경제","활성화"],synonyms:["일자리","소득","지역 발전"]},{label:"전통문화 보존의 필요성을 설명함",weight:25,keywords:["전통문화","보존","정체성"],synonyms:["문화유산","지역성","계승"]},{label:"개발과 보존의 충돌을 통합적 관점에서 분석함",weight:30,keywords:["통합적 관점","충돌","분석"],synonyms:["사회적","윤리적","공간적","시간적"]},{label:"구체적인 해결 방안을 제시함",weight:25,keywords:["해결 방안","주민 참여","지속 가능"],synonyms:["규제","협의","균형"]}], modelAnswer:"관광 개발은 지역 경제를 활성화하고 일자리와 소득을 늘리는 긍정적 효과가 있다. 그러나 개발 과정에서 전통 마을이나 문화유산이 훼손되면 지역 정체성과 역사적 가치가 약해질 수 있다. 이 문제는 경제적 이익만으로 판단할 수 없으며, 시간적 관점에서 문화유산의 역사적 가치, 공간적 관점에서 지역 환경 변화, 사회적 관점에서 주민의 삶, 윤리적 관점에서 미래 세대에 대한 책임을 함께 고려해야 한다. 해결을 위해 주민 참여를 보장하고, 전통문화 보존 구역을 설정하며, 지역 고유성을 살린 지속 가능한 관광을 추진해야 한다."}
];

/* ─── STATE ─── */
let currentIdx = 0;
const state = {}; // { idx: { score, level, detail, feedback, graded } }

/* ─── HELPERS ─── */
function norm(t) {
  return t.toLowerCase().replace(/[<>{}()[\]`"'\\]/g," ").replace(/\s+/g," ").trim();
}

function hasAny(ans, words) {
  return words.some(w => ans.includes(norm(w)));
}

function getLevel(s) {
  if (s >= 85) return "우수";
  if (s >= 70) return "양호";
  if (s >= 50) return "기본";
  return "보완 필요";
}

function getLevelClass(l) {
  const m = {"우수":"excellent","양호":"good","기본":"basic","보완 필요":"poor"};
  return "level-" + (m[l] || "poor");
}

function localGrade(answer, rubric) {
  const safe = norm(answer);
  let total = 0;
  const detail = rubric.map(item => {
    const hasKw = hasAny(safe, item.keywords);
    const hasSyn = hasAny(safe, item.synonyms);
    let pt = 0, status = "미충족";
    if (hasKw) { pt = item.weight; status = "충족"; }
    else if (hasSyn) { pt = Math.round(item.weight * 0.7); status = "부분 충족"; }
    total += pt;
    return { label: item.label, weight: item.weight, point: pt, status };
  });
  return { score: Math.min(100, total), detail };
}

function toast(msg, type="") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (type ? " " + type : "");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = "toast", 2800);
}

/* ─── RENDER ─── */
function renderSidebar() {
  const sb = document.getElementById("sidebar");
  let lastUnit = "";
  sb.innerHTML = QUESTIONS.map((q, i) => {
    let label = "";
    if (q.unit !== lastUnit) {
      lastUnit = q.unit;
      label = `<div class="sidebar-section-label">${q.unit}</div>`;
    }
    const graded = state[i] ? " graded" : "";
    const active = i === currentIdx ? " active" : "";
    return `${label}<div class="sidebar-item${active}${graded}" onclick="goTo(${i})">
      <span class="sidebar-num">${i+1}</span>
      <span class="sidebar-text">${q.prompt.slice(0,32)}…</span>
      <div class="sidebar-done"></div>
    </div>`;
  }).join("");
}

function renderStats() {
  const done = Object.keys(state).length;
  const scores = Object.values(state).map(s => s.score);
  document.getElementById("statDone").innerHTML = done + '<span class="stat-unit">문</span>';
  document.getElementById("statAvg").textContent = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : "—";
  document.getElementById("statBest").textContent = scores.length ? Math.max(...scores) : "—";
  document.getElementById("progressText").textContent = `${done} / ${QUESTIONS.length}`;
  document.getElementById("progressBar").style.width = (done / QUESTIONS.length * 100) + "%";
}

function renderQuestion() {
  const q = QUESTIONS[currentIdx];
  document.getElementById("qNum").textContent = currentIdx + 1;
  document.getElementById("qUnit").textContent = q.unit;
  document.getElementById("qTitle").textContent = q.prompt;
  document.getElementById("navLabel").textContent = `${currentIdx+1} / ${QUESTIONS.length}번 문항`;
  document.getElementById("prevBtn").disabled = currentIdx === 0;
  document.getElementById("nextBtn").disabled = currentIdx === QUESTIONS.length - 1;

  const s = state[currentIdx];
  const inp = document.getElementById("answerInput");
  const result = document.getElementById("resultPanel");
  const modelBtn = document.getElementById("modelBtn");
  const modelWrap = document.getElementById("modelAnswerWrap");

  if (s) {
    inp.value = s.answer || "";
    inp.disabled = false;
    updateCharCount(inp.value);
    result.style.display = "block";
    modelBtn.style.display = "inline-flex";
    modelWrap.style.display = "none";
    document.getElementById("scoreNum").textContent = s.score;
    const lb = document.getElementById("levelBadge");
    lb.textContent = s.level;
    lb.className = "level-badge " + getLevelClass(s.level);
    document.getElementById("aiFeedback").textContent = s.feedback || "";
    document.getElementById("modelAnswerText").textContent = q.modelAnswer;
    renderRubric(s.detail);
  } else {
    inp.value = "";
    inp.disabled = false;
    updateCharCount("");
    result.style.display = "none";
    modelBtn.style.display = "none";
    modelWrap.style.display = "none";
  }

  document.getElementById("gradeAiBtn").disabled = (inp.value.trim().length < 30) || !!s;
}

function renderRubric(detail) {
  const grid = document.getElementById("rubricGrid");
  grid.innerHTML = detail.map(item => {
    const cls = item.status === "충족" ? "rubric-good" : item.status === "부분 충족" ? "rubric-mid" : "rubric-bad";
    return `<div class="rubric-row ${cls}">
      <div class="rubric-label">${item.label}</div>
      <div class="rubric-score-wrap">
        <span class="rubric-status">${item.status}</span>
        <span class="rubric-pts">${item.point} / ${item.weight}점</span>
      </div>
    </div>`;
  }).join("");
}

/* ─── CHAR COUNT ─── */
function updateCharCount(val) {
  const len = val.length;
  const fill = document.getElementById("charBarFill");
  const count = document.getElementById("charCount");
  const pct = Math.min(100, len / 1200 * 100);
  fill.style.width = pct + "%";
  fill.classList.toggle("ready", len >= 30);
  count.textContent = len + " / 1200자";
  const note = document.getElementById("minNote");
  note.textContent = len < 30 ? `최소 ${30 - len}자 더 작성 필요` : "채점 가능 ✓";
  note.style.color = len >= 30 ? "var(--green)" : "var(--ink-4)";
}

document.getElementById("answerInput").addEventListener("input", function() {
  updateCharCount(this.value);
  const hasEnough = this.value.trim().length >= 30;
  document.getElementById("gradeAiBtn").disabled = !hasEnough || !!state[currentIdx];
});

/* ─── AI GRADE ─── */
async function gradeWithAI() {
  const q = QUESTIONS[currentIdx];
  const answer = document.getElementById("answerInput").value.trim();
  if (answer.length < 30) { toast("30자 이상 작성해 주세요.", "error"); return; }

  const btn = document.getElementById("gradeAiBtn");
  btn.classList.add("loading");
  btn.disabled = true;

  const resultPanel = document.getElementById("resultPanel");
  resultPanel.style.display = "block";

  const local = localGrade(answer, q.rubric);
  document.getElementById("scoreNum").textContent = local.score;
  const lb = document.getElementById("levelBadge");
  lb.textContent = getLevel(local.score);
  lb.className = "level-badge " + getLevelClass(getLevel(local.score));
  renderRubric(local.detail);

  const feedbackEl = document.getElementById("aiFeedback");
  feedbackEl.innerHTML = '<span class="streaming-cursor"></span>';

  const rubricText = q.rubric.map((r, i) => {
    const d = local.detail[i];
    return `• ${r.label} [${d.point}/${r.weight}점, ${d.status}]`;
  }).join("\n");

  const prompt = `당신은 통합사회 교사입니다. 학생의 서논술형 답안을 채점하고 건설적인 피드백을 제공해 주세요.

문제: ${q.prompt}

학생 답안: ${answer}

채점 기준별 결과:
${rubricText}

자동 채점 점수: ${local.score}점 (${getLevel(local.score)})

모범 답안 참고: ${q.modelAnswer}

다음 형식으로 피드백을 작성해 주세요 (총 150~200자 내외):
1. 잘된 점 한 가지
2. 보완할 점 한 가지  
3. 핵심 조언 한 문장

친절하고 구체적으로, 학생이 다음에 더 잘 쓸 수 있도록 도움이 되는 내용으로 작성해 주세요.`;

  let feedback = "";
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        stream: true,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!resp.ok) throw new Error("API 오류");

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    feedbackEl.innerHTML = '<span class="streaming-cursor"></span>';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6);
        if (data === "[DONE]") break;
        try {
          const json = JSON.parse(data);
          if (json.type === "content_block_delta" && json.delta?.text) {
            feedback += json.delta.text;
            feedbackEl.innerHTML = feedback + '<span class="streaming-cursor"></span>';
          }
        } catch {}
      }
    }

    feedbackEl.innerHTML = feedback || "AI 피드백을 생성하지 못했습니다.";

  } catch (e) {
    feedbackEl.innerHTML = "AI 피드백 생성 중 오류가 발생했습니다. 채점 결과는 위의 항목별 평가를 참고해 주세요.";
    toast("API 연결 실패. 항목별 채점 결과를 확인하세요.", "error");
  }

  state[currentIdx] = {
    score: local.score,
    level: getLevel(local.score),
    detail: local.detail,
    feedback: feedbackEl.textContent,
    answer
  };

  btn.classList.remove("loading");
  document.getElementById("modelBtn").style.display = "inline-flex";
  document.getElementById("answerInput").disabled = false;
  renderSidebar();
  renderStats();
}

/* ─── CONTROLS ─── */
function toggleModelAnswer() {
  if (!state[currentIdx]) { toast("먼저 채점해 주세요."); return; }
  const wrap = document.getElementById("modelAnswerWrap");
  const q = QUESTIONS[currentIdx];
  document.getElementById("modelAnswerText").textContent = q.modelAnswer;
  wrap.style.display = wrap.style.display === "block" ? "none" : "block";
}

function resetAnswer() {
  const s = state[currentIdx];
  if (s && !confirm("채점 결과가 초기화됩니다. 계속하시겠습니까?")) return;
  delete state[currentIdx];
  renderQuestion();
  renderSidebar();
  renderStats();
}

function goTo(idx) {
  currentIdx = idx;
  renderQuestion();
  renderSidebar();
  document.getElementById("main").scrollTo({ top: 0, behavior: "smooth" });
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next < 0 || next >= QUESTIONS.length) return;
  goTo(next);
}

/* ─── INIT ─── */
renderSidebar();
renderStats();
renderQuestion();
</script>
